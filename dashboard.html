<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SecureAuth | Dashboard</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard">

    <div class="dashboard-card">

        <h2 id="welcome"></h2>

        <p>
            You have successfully logged into SecureAuth.
            This is a protected dashboard page.
        </p>

        <div class="info-box">
            <strong>Name:</strong>
            <p id="userName"></p>
        </div>

        <div class="info-box">
            <strong>Email:</strong>
            <p id="userEmail"></p>
        </div>

        <a href="#" id="logoutBtn" class="logout-btn">
            Logout
        </a>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
